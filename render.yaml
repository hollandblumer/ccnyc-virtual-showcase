services:
  - type: web
    name: ccnyc-virtual-showcase
    runtime: node
    plan: free
    autoDeploy: true
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 24.14.1
      - key: SQLITE_PATH
        value: /tmp/ccnyc.sqlite
